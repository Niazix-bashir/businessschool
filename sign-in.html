<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAtw5l9qeb-yjVAk1HvN6BiPc0LBK00aO4",
    authDomain: "kbschool-623a7.firebaseapp.com",
    projectId: "kbschool-623a7",
    storageBucket: "kbschool-623a7.firebasestorage.app",
    messagingSenderId: "416719769601",
    appId: "1:416719769601:web:ede07fd447328fd326b000"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    signInWithEmailAndPassword(
        auth,
        email,
        password
    )
    .then((userCredential) => {

        alert("Login Successful");

        window.location.href =
        "dashboard.html";

    })
    .catch((error) => {

        alert(error.message);

    });

}

</script>
