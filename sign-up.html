<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    updateProfile
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAtw5l9qeb-yjVAk1HvN6BiPc0LBK00aO4",
    authDomain: "kbschool-623a7.firebaseapp.com",
    projectId: "kbschool-623a7",
    storageBucket: "kbschool-623a7.firebasestorage.app",
    messagingSenderId: "416719769601",
    appId: "1:416719769601:web:ede07fd447328fd326b000"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = async function() {

    const firstName =
    document.getElementById("firstName").value;

    const surname =
    document.getElementById("surname").value;

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const confirmPassword =
    document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Passwords do not match");
        return;
    }

    try {

        const userCredential =
        await createUserWithEmailAndPassword(
            auth,
            email,
            password
        );

        await updateProfile(
            userCredential.user,
            {
                displayName:
                firstName + " " + surname
            }
        );

        alert("Account Created Successfully");

        window.location.href =
        "dashboard.html";

    }
    catch(error){

        alert(error.message);

    }

}

</script>
